# =============================================================================
# Station registry — defined ONCE here, used by every asset class.
# Each asset catalog (plc/hmi/switch/process) generates one host per site via its
# `host_template`. Add a station here → it appears in all asset classes, on the
# geomap, and in the simulator. That's the only place to edit for "more rows".
#
# Fields: code (host-name token), name (display), location/lat/lon/city (inventory
# + geomap), and per-site attributes referenced by host_template macros
# (grade = HMI hardware tier, p_out_sp = regulated outlet pressure setpoint barg).
# =============================================================================
# The three stations form the SSWJ (South Sumatra–West Java) transmission chain:
# Grissik (source, SumSel) -> Terbanggi Besar (receiving/distribution, Lampung
# Tengah — PGN station at Bandar Gunung Agung, on line since 2007) -> Bojonegara
# (Banten terminal, via the Sunda Strait offshore section).
sites:
  - { code: GRS, name: "Grissik",      location: "Grissik Gas Plant, Sungai Lilin, Musi Banyuasin, Sumatra Selatan", lat: "-2.0500", lon: "103.4300", city: "Musi Banyuasin", grade: enterprise, p_out_sp: "16" }
  - { code: TBB, name: "Terbanggi Besar", location: "Stasiun Terbanggi Besar, Bandar Gunung Agung, Lampung Tengah (SSWJ)", lat: "-4.8700", lon: "105.2200", city: "Lampung Tengah", grade: enterprise, p_out_sp: "14" }
  - { code: BJN, name: "Bojonegara",   location: "Stasiun Bojonegara, Cilegon/Serang, Banten",                       lat: "-5.9020", lon: "106.0780", city: "Cilegon",        grade: enterprise, p_out_sp: "15" }
