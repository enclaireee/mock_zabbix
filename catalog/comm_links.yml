# PHYSICAL SEGMENTS (11) — fictional spans across 4 wired media types. Real
# Indonesian carriers stand in for the (NDA-protected) actual vendor data.
# -----------------------------------------------------------------------------
segments:
  # Metro-E fiber (1-3)
  - { key: "seg.pgn_metroe_segment1", name: "PGN_Segment1 — Metro-E fiber, PGN_Station1–PGN_Station2 (Telkom)",      <<: *seg_defaults, source: "Fictional topology; SFF-8472 DDM" }
  - { key: "seg.pgn_metroe_segment2", name: "PGN_Segment2 — Metro-E fiber, PGN_Station2–PGN_Station3 (Icon+)",       <<: *seg_defaults, source: "Fictional topology; SFF-8472 DDM" }
  - { key: "seg.pgn_metroe_segment3", name: "PGN_Segment3 — Metro-E fiber, PGN_Station3–PGN_Station4 (Moratelindo)", <<: *seg_defaults, source: "Fictional topology; SFF-8472 DDM" }
  # MPLS CE ports / DWDM backbone (4-6)
  - { key: "seg.pgn_mpls_segment4", name: "PGN_Segment4 — MPLS CE port, PGN_Station2–PGN_Station5 (Telkom)",     <<: *seg_defaults, component: "Physical media (MPLS/DWDM backbone)", collection: "native SNMP optical DDM/DOM on self-managed MPLS CE port SFP", failure_mode: "PE-CE link down, CE SFP aging, provider MPLS/DWDM core fault", source: "Fictional topology; SFF-8472 DDM" }
  - { key: "seg.pgn_mpls_segment5", name: "PGN_Segment5 — MPLS CE port, PGN_Station5–PGN_Station6 (Lintasarta)", <<: *seg_defaults, component: "Physical media (MPLS/DWDM backbone)", collection: "native SNMP optical DDM/DOM on self-managed MPLS CE port SFP", failure_mode: "PE-CE link down, CE SFP aging, provider MPLS/DWDM core fault", source: "Fictional topology; SFF-8472 DDM" }
  - { key: "seg.pgn_mpls_segment6", name: "PGN_Segment6 — MPLS CE port, PGN_Station2–PGN_Station6 (Telkomsat)",  <<: *seg_defaults, component: "Physical media (MPLS/DWDM backbone)", collection: "native SNMP optical DDM/DOM on self-managed MPLS CE port SFP", failure_mode: "PE-CE link down, CE SFP aging, provider MPLS/DWDM core fault", source: "Fictional topology; SFF-8472 DDM" }
  # SDH/SONET self-healing ring (7-9)
  - { key: "seg.pgn_sdh_segment7", name: "PGN_Segment7 — SDH/SONET ring path, PGN_Station3–PGN_Station6 (PGN-owned)", <<: *ring_defaults, source: "Fictional topology; ITU-T G.841 APS 50ms switchover" }
  - { key: "seg.pgn_sdh_segment8", name: "PGN_Segment8 — SDH/SONET ring path, PGN_Station6–PGN_Station4 (PGN-owned)", <<: *ring_defaults, source: "Fictional topology; ITU-T G.841 APS 50ms switchover" }
  - { key: "seg.pgn_sdh_segment9", name: "PGN_Segment9 — SDH/SONET ring path, PGN_Station4–PGN_Station3 (PGN-owned)", <<: *ring_defaults, source: "Fictional topology; ITU-T G.841 APS 50ms switchover" }
  # Microwave PTP (10-11)
  - { key: "seg.pgn_microwave_segment10", name: "PGN_Segment10 — Microwave PTP, PGN_Station4–PGN_Station7 (PGN-owned, Protelindo tower)", <<: *mw_defaults, source: "Fictional topology; Aviat Networks RSL guidance" }
  - { key: "seg.pgn_microwave_segment11", name: "PGN_Segment11 — Microwave PTP, PGN_Station7–PGN_Station8 (Telkomsat radio-over-IP)",      <<: *mw_defaults, source: "Fictional topology; Aviat Networks RSL guidance" }

# -----------------------------------------------------------------------------
# LOGICAL CIRCUITS (20) — `depends_on` = the segment(s) each rides (multi-hop
# chains ride 2-3 in series); state = worst of them. SCPC/IP-VSAT/APN/LEO
# circuits ride nothing (independent carrier-managed RF path).
# -----------------------------------------------------------------------------
circuits:
  # -- Metro-E data/voice trunks (1-3) --
  - { key: "circ.pgn_metroe_circuit1", name: "PGN_Circuit1 (Metro-E data trunk, Station1–Station2)",  media: "Metro-E", depends_on: [ "seg.pgn_metroe_segment1" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit", collection: "derived from terminating Metro-E port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment1; fails with the span", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_metroe_circuit2", name: "PGN_Circuit2 (Metro-E channelized voice, Station1–Station2)", media: "Metro-E", depends_on: [ "seg.pgn_metroe_segment1" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (voice)", collection: "derived from terminating Metro-E port (IF-MIB ifOperStatus)", failure_mode: "Shares PGN_Segment1 fiber with circuit1; drops together", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_metroe_circuit3", name: "PGN_Circuit3 (Metro-E long-haul trunk, Station1–Station4, 3-hop)", media: "Metro-E", depends_on: [ "seg.pgn_metroe_segment1", "seg.pgn_metroe_segment2", "seg.pgn_metroe_segment3" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit", collection: "derived from terminating Metro-E port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment1-3 in series; fails if any span cuts", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  # -- MPLS/DWDM backbone trunks (4-6) --
  - { key: "circ.pgn_mpls_circuit4", name: "PGN_Circuit4 (MPLS/DWDM trunk, Station2–Station5)", media: "MPLS", depends_on: [ "seg.pgn_mpls_segment4" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (backhaul)", collection: "derived from MPLS CE port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment4; fails with the CE link", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_mpls_circuit5", name: "PGN_Circuit5 (MPLS/DWDM trunk, Station5–Station6)", media: "MPLS", depends_on: [ "seg.pgn_mpls_segment5" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (backhaul)", collection: "derived from MPLS CE port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment5; fails with the CE link", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_mpls_circuit6", name: "PGN_Circuit6 (MPLS/DWDM trunk, Station2–Station6, dedicated alt path)", media: "MPLS", depends_on: [ "seg.pgn_mpls_segment6" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (backhaul)", collection: "derived from MPLS CE port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment6; fails with the CE link", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  # -- SDH/SONET self-healing ring circuits (7-9) --
  - { key: "circ.pgn_sdh_circuit7", name: "PGN_Circuit7 (SDH/SONET ring, Station3–Station6)", media: "SDH/SONET", depends_on: [ "seg.pgn_sdh_segment7" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (protected)", collection: "derived from the SDH/SONET ADM's protected-path status (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment7; protected by ring APS, only degrades/fails on a sustained or correlated fault", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_sdh_circuit8", name: "PGN_Circuit8 (SDH/SONET ring, Station6–Station4)", media: "SDH/SONET", depends_on: [ "seg.pgn_sdh_segment8" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (protected)", collection: "derived from the SDH/SONET ADM's protected-path status (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment8; protected by ring APS, only degrades/fails on a sustained or correlated fault", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_sdh_circuit9", name: "PGN_Circuit9 (SDH/SONET ring, Station4–Station3)", media: "SDH/SONET", depends_on: [ "seg.pgn_sdh_segment9" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit (protected)", collection: "derived from the SDH/SONET ADM's protected-path status (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment9; protected by ring APS, only degrades/fails on a sustained or correlated fault", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  # -- Microwave PTP trunks (10-12) --
  - { key: "circ.pgn_microwave_circuit10", name: "PGN_Circuit10 (Microwave trunk, Station4–Station7)", media: "Microwave PTP", depends_on: [ "seg.pgn_microwave_segment10" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit", collection: "derived from terminating microwave IDU port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment10; fails with the hop", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_microwave_circuit11", name: "PGN_Circuit11 (Microwave trunk, Station7–Station8)", media: "Microwave PTP", depends_on: [ "seg.pgn_microwave_segment11" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit", collection: "derived from terminating microwave IDU port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment11; fails with the hop", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  - { key: "circ.pgn_microwave_circuit12", name: "PGN_Circuit12 (Microwave trunk, Station4–Station8, 2-hop relay)", media: "Microwave PTP", depends_on: [ "seg.pgn_microwave_segment10", "seg.pgn_microwave_segment11" ], value_type: unsigned, units: "", interval: "1m", component: "Logical circuit", collection: "derived from terminating microwave IDU port (IF-MIB ifOperStatus)", failure_mode: "Rides PGN_Segment10+11 relay chain; fails if either hop cuts", source: "Fictional topology", sim: *circ_sim, triggers: *circ_trigs }
  # -- SCPC VSAT, dedicated, independent (13-15) --
  - { key: "circ.pgn_scpc_circuit13", name: "PGN_Circuit13 (SCPC VSAT, Station5, Telkomsat)", <<: *scpc_defaults, source: "Fictional topology" }
  - { key: "circ.pgn_scpc_circuit14", name: "PGN_Circuit14 (SCPC VSAT, Station6, Lintasarta)", <<: *scpc_defaults, source: "Fictional topology" }
  - { key: "circ.pgn_scpc_circuit15", name: "PGN_Circuit15 (SCPC VSAT, Station8, PSN)",        <<: *scpc_defaults, source: "Fictional topology" }
  # -- IP VSAT, shared TDMA, independent (16-17) --
  - { key: "circ.pgn_ipvsat_circuit16", name: "PGN_Circuit16 (IP VSAT shared, Station7, Telkomsat)",  <<: *ipvsat_defaults, source: "Fictional topology" }
  - { key: "circ.pgn_ipvsat_circuit17", name: "PGN_Circuit17 (IP VSAT shared, Station8, Lintasarta)", <<: *ipvsat_defaults, source: "Fictional topology" }
  # -- Private APN (cellular), independent (18-19) --
  - { key: "circ.pgn_apn_circuit18", name: "PGN_Circuit18 (Private APN, Station5, Telkomsel)", <<: *apn_defaults, source: "Fictional topology" }
  - { key: "circ.pgn_apn_circuit19", name: "PGN_Circuit19 (Private APN, Station6, Indosat)",   <<: *apn_defaults, source: "Fictional topology" }
  # -- LEO emergency backup, independent (20) --
  - { key: "circ.pgn_leo_circuit20", name: "PGN_Circuit20 (LEO emergency backup, Station8, Starlink Business)", <<: *leo_defaults, source: "Fictional topology" }
