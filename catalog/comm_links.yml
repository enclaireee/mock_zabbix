# =============================================================================
# Asset Class: Communication-Link SLA System (PGN "Media Link Komunikasi")
#
# The FIFTH system in the lab. The real PGN Media Link SLA report (station names,
# link routing, capacities, provider contracts) is NDA-protected. This catalog is
# a FULLY FICTIONAL topology — invented stations (PGN_Station1-8), invented
# segments/circuits (PGN_SegmentN / PGN_CircuitN), independently designed from
# public WAN-technology references, not derived from or mirroring the real
# report's structure in any way. It keeps the real system's two-layer shape and
# covers 8 WAN technologies used on real gas-transmission comm networks
# (grounded in public vendor/standards docs — see the `source` field on each
# sim block below, and `docs/comm-links-sla.md` for the full writeup):
#
#   segments:  physical/carrier media that fails as a unit — a fiber span, MPLS
#              CE port, SDH/SONET ring path, or microwave hop between two
#              stations. One Zabbix item each (numeric signal-quality metric
#              appropriate to the medium, banded good/underperform/failed).
#   circuits:  the 20 logical links. A Metro-E/MPLS/SDH/microwave circuit rides
#              one or more segments (`depends_on`) and its status is the WORST
#              of them — so one span fault drops every circuit riding it
#              together, the way a real fiber cut or tower outage would.
#              SCPC/IP-VSAT/Private-APN/LEO circuits ride NO segment
#              (independent carrier-managed RF path) and are simulated as
#              their own signal metric with no physical media to share.
#
# All items live on one NOC host (these are point-to-point links watched centrally,
# not per-site assets). The dependency mechanic lives in otobs/simulate.py
# (segment_forces); SLA %/services live in otobs/sla.py.
# Full rationale: docs/comm-links-sla.md.
# =============================================================================
asset_class: "Communication Links"
host_group: "Network/Comm Links"
template_name: "Template OT Comm Links"
template_group: "Templates/OT"

hosts:
  - host: "COMM-PGN-NOC01"
    name: "PGN Network Operations Center (NOC)"
    macros: { "{$SLA_TARGET}": "98" }
    inventory:
      location: "PGN Central Network Operations Center, Indonesia"
      location_lat: "-6.2088"
      location_lon: "106.8456"
      site_city: "Jakarta"
      site_country: "Indonesia"

# Reusable sim/trigger blocks. `_anchors` is not a schema key — the loader ignores
# unknown top-level keys; it exists only so the YAML anchors below have a home.
_anchors:
  # -- Metro-E fiber: terminating SFP's OPTICAL Rx POWER (dBm), read from DDM/DOM —
  # the standard fiber-span degradation signal. Higher dBm = healthier; it drifts
  # DOWN toward the receiver sensitivity floor (~-21 dBm for 1000BASE-LX) as a span
  # ages/bends/gets dirty. Bands named good/underperform/failed so segment->circuit
  # derivation keys off them (otobs/simulate.py segment_forces, generic across media).
  seg_sim: &seg_sim
    kind: numeric
    good:         [-14, -4]     # healthy Rx: comfortable margin above sensitivity
    underperform: [-20, -16]    # low margin — bend/aging/dirty connector: warning
    failed:       [-30, -22]    # below the ~-21 dBm sensitivity floor -> LOS, down
    weights: [good, underperform, failed]
    jitter: 0.4
  seg_trigs: &seg_trigs
    - { op: "<=", value: -16, severity: warning, label: "Optical Rx low — span degrading toward LOS" }
    - { op: "<=", value: -22, severity: high,    label: "Optical LOS — segment down, every circuit on it drops" }
  seg_defaults: &seg_defaults
    value_type: float
    units: "dBm"
    interval: "1m"
    component: "Physical media (fiber span)"
    collection: "native SNMP optical DDM/DOM (Rx power on terminating Metro-E SFP, SFF-8472)"
    failure_mode: "Fiber cut, SFP laser aging/death, macro-bend past radius, splice loss, ROW excavation"
    sim: *seg_sim
    triggers: *seg_trigs

  # -- SDH/SONET self-healing ring: same physical signal as fiber (SDH ADMs carry
  # standard optical SFPs with DDM), but WEIGHTED very differently. ITU-T G.841
  # requires Automatic Protection Switching to complete within 50ms (detect+switch
  # ~60ms total) — so a single-direction fault on a protected ring is masked before
  # it ever shows as a sustained failure. The resilience is modelled as a heavy skew
  # toward `good` (not a second dependency layer / best-of mechanic — that would
  # require changing segment_forces()'s worst-of logic). A sustained `failed`
  # reading only shows up on a genuine correlated fault hitting BOTH ring paths.
  ring_sim: &ring_sim
    kind: numeric
    good:         [-14, -4]
    underperform: [-20, -16]
    failed:       [-30, -22]
    weights: [0.97, 0.025, 0.005]   # vs fiber's default 0.90/0.08/0.02 — APS absorbs single faults
    jitter: 0.35
  ring_trigs: &ring_trigs
    - { op: "<=", value: -16, severity: warning, label: "SDH/SONET path degrading — protection switch may activate" }
    - { op: "<=", value: -22, severity: high,    label: "SDH/SONET ring failed — correlated fault on BOTH ring paths" }
  ring_defaults: &ring_defaults
    value_type: float
    units: "dBm"
    interval: "1m"
    component: "Physical media (SDH/SONET protected ring span)"
    collection: "native SNMP optical DDM/DOM on self-managed SDH/SONET ADM transceiver"
    failure_mode: "Single-direction fault masked by APS/MS-SPRing switchover (ITU-T G.841, <=60ms); sustained failure only on a correlated dual-path fault"
    sim: *ring_sim
    triggers: *ring_trigs

  # -- Microwave PTP: Receive Signal Level (RSL, dBm — sometimes called RSSI on
  # cellular-derived radio gear) off the ODU. Normal operation holds within ~2 dB
  # of the designed nominal; RSL sags as rain/multipath fade eats the fade margin,
  # and a digital microwave path typically goes unusable in the -70..-80 dBm range.
  mw_sim: &mw_sim
    kind: numeric
    good:         [-35, -25]    # nominal RSL, healthy fade margin
    underperform: [-55, -45]    # fade margin eroding — rain/vegetation/misalignment
    failed:       [-80, -65]    # below typical digital-microwave Rx threshold -> LOS
    weights: [good, underperform, failed]
    jitter: 0.4
  mw_trigs: &mw_trigs
    - { op: "<=", value: -45, severity: warning, label: "Microwave RSL fading — path margin eroding" }
    - { op: "<=", value: -65, severity: high,    label: "Microwave path down — RSL below Rx threshold (LOS)" }
  mw_defaults: &mw_defaults
    value_type: float
    units: "dBm"
    interval: "1m"
    component: "Physical media (microwave PTP)"
    collection: "RSL polled via NMS/craft SNMP on the microwave ODU"
    failure_mode: "Rain/multipath fade, ODU or antenna misalignment, tower power loss"
    sim: *mw_sim
    triggers: *mw_trigs

  # Circuit = up / degraded / down, for every wired medium (Metro-E/MPLS/SDH/
  # microwave). State is FORCED to the WORST depended segment (weights ignored), so
  # a warning-level span shows its circuits as 'degraded' before they go down.
  circ_sim: &circ_sim
    kind: enum
    states:
      - { value: 1, weight: good,         label: "up(1)" }
      - { value: 3, weight: underperform, label: "degraded(3) — media impaired, errored/retransmitting" }
      - { value: 2, weight: failed,       label: "down(2)" }
  circ_trigs: &circ_trigs
    - { op: "=", value: 3, severity: warning, label: "Circuit degraded — riding a warning media segment" }
    - { op: "=", value: 2, severity: high,    label: "Circuit down — media segment fault" }

  # -- SCPC VSAT (dedicated carrier): independent ICMP ping-loss %, no segment.
  # Single Channel Per Carrier gives each remote a fixed, uncontended slice of
  # transponder bandwidth — real-world SCPC is reported as effectively
  # packet-loss-free under normal conditions (no contention with other remotes),
  # so `good` and the overall weighting are tighter/better than shared TDMA below.
  scpc_sim: &scpc_sim
    kind: numeric
    good: [0, 0.5]
    underperform: [2, 15]
    failed: [55, 100]
    weights: [0.93, 0.06, 0.01]
    jitter: 0.4
  scpc_trigs: &scpc_trigs
    - { op: ">=", value: 2,  severity: warning, label: "SCPC packet loss — rain fade on dedicated carrier" }
    - { op: ">=", value: 55, severity: high,    label: "SCPC link down — RF path lost" }
  scpc_defaults: &scpc_defaults
    media: "SCPC VSAT (dedicated)"
    depends_on: []
    value_type: float
    units: "%"
    interval: "1m"
    component: "Logical circuit (satellite, dedicated)"
    collection: "Simple check (icmppingloss) — dedicated carrier, no MIB access to the leased modem"
    failure_mode: "Rain fade / atmospheric attenuation on the dedicated carrier, modem de-lock"
    sim: *scpc_sim
    triggers: *scpc_trigs

  # -- IP VSAT (shared TDMA): same ping-loss mechanic as SCPC, but the remote
  # shares its inroute timeslot pool with other sites on the same beam/hub —
  # real-world shared TDMA VSAT carries genuine contention risk that a dedicated
  # SCPC carrier doesn't, so baseline loss is non-zero even in `good` and the
  # weighting skews worse than SCPC's.
  ipvsat_sim: &ipvsat_sim
    kind: numeric
    good: [0, 3]
    underperform: [5, 30]
    failed: [55, 100]
    weights: [0.85, 0.12, 0.03]
    jitter: 0.6
  ipvsat_trigs: &ipvsat_trigs
    - { op: ">=", value: 5,  severity: warning, label: "IP VSAT packet loss — TDMA inroute contention / rain fade" }
    - { op: ">=", value: 55, severity: high,    label: "IP VSAT link down — RF path lost" }
  ipvsat_defaults: &ipvsat_defaults
    media: "IP VSAT (shared TDMA)"
    depends_on: []
    value_type: float
    units: "%"
    interval: "1m"
    component: "Logical circuit (satellite, shared)"
    collection: "Simple check (icmppingloss) — shared inroute, no MIB access to the leased modem"
    failure_mode: "TDMA inroute contention during peak simultaneous use across remote sites, rain fade, modem de-lock"
    sim: *ipvsat_sim
    triggers: *ipvsat_trigs

  # -- Private APN (cellular 4G/LTE): independent RSRP (dBm) off the cellular
  # router modem, no segment. Bands per practical 3GPP RSRP benchmarks (good
  # above ~-85 dBm, weak below ~-105..-110 dBm no-service floor).
  apn_sim: &apn_sim
    kind: numeric
    good: [-85, -70]
    underperform: [-100, -90]
    failed: [-119, -108]
    weights: [good, underperform, failed]
    jitter: 0.35
  apn_trigs: &apn_trigs
    - { op: "<=", value: -90,  severity: warning, label: "APN signal degrading — cell-edge RSRP" }
    - { op: "<=", value: -108, severity: high,    label: "APN link down — RSRP below usable threshold" }
  apn_defaults: &apn_defaults
    media: "Private APN (4G/LTE)"
    depends_on: []
    value_type: float
    units: "dBm"
    interval: "1m"
    component: "Logical circuit (cellular)"
    collection: "Modem RSRP via AT command / SNMP MIB on the cellular router — carrier-managed radio path, no owned segment"
    failure_mode: "Cell congestion, coverage gap, tower power loss, APN de-registration"
    sim: *apn_sim
    triggers: *apn_trigs

  # -- LEO (Starlink-class) portable terminal: emergency/last-resort backup tier,
  # independent ping-loss %, no segment. Public LEO performance data reports
  # >99.9% uptime and <1% packet loss in clear conditions — far better per-hop
  # reliability than legacy GEO VSAT — so its `good` band is the tightest of any
  # satellite tier here. It's a "last resort" by ROLE (portable emergency
  # backhaul), not because the radio link itself is unreliable; its occasional
  # dips are beam-handover gaps and physical obstruction, not rain fade.
  leo_sim: &leo_sim
    kind: numeric
    good: [0, 1]
    underperform: [3, 15]
    failed: [50, 100]
    weights: [0.95, 0.04, 0.01]
    jitter: 0.3
  leo_trigs: &leo_trigs
    - { op: ">=", value: 3,  severity: warning, label: "LEO packet loss — beam handover / obstruction" }
    - { op: ">=", value: 50, severity: high,    label: "LEO link down — terminal lost lock" }
  leo_defaults: &leo_defaults
    media: "LEO Satellite (Starlink-class)"
    depends_on: []
    value_type: float
    units: "%"
    interval: "1m"
    component: "Logical circuit (satellite, LEO emergency backup)"
    collection: "Simple check (icmppingloss) — portable emergency terminal, no MIB access"
    failure_mode: "Beam-handover gap, physical obstruction (foliage/structure), weather attenuation — backup tier, not primary"
    sim: *leo_sim
    triggers: *leo_trigs

