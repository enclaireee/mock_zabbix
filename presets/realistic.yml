# preset: realistic — models how an actual gas-transmission station behaves.
#
# Grounded in real plant behavior:
#   * Process variables are PID-controlled -> they hover around a setpoint with
#     small proportional noise, they don't wander across their range. Modeled by
#     continuity.reversion (mean-reversion to the band centre).
#   * Gas throughput is diurnal -> flow, compressor load and operator activity
#     follow daily demand (lowest overnight, higher through the working day).
#     Modeled by time_of_day, which shifts the continuity setpoint.
#   * Faults are causal -> a real failure drags physically-connected params with
#     it (lost lube oil overheats the bearing, which shakes the rotor, ...).
#   * Field links occasionally drop a reading.
#
# Workflow:  make config MODE=realistic && make check && make backfill && make simulate
# (backfill is a manual step — it replays THIS config over the past window.)

# Analog signals mean-revert to setpoint (reversion) and drift with small steps;
# jitter=0 counters (fault counts, SMART sectors) hold until an actual state change.
continuity:
  enabled: true
  step_scale: 0.8        # per-tick step = 0.8 x the param's jitter (calm, plant-like)
  reversion: 0.12        # pull back to setpoint each tick — a controlled loop, not a walk

# Daily demand cycle. With continuity on, this shifts the setpoint the value is held
# to (rather than scaling the raw sample). Peak hours in local time (settings.TIMEZONE).
# Gas-for-power demand tracks the grid: lowest pre-dawn (~05:00), high through the
# working day into the Java-Bali evening peak — hence the wide 06-22 peak window.
# shoulder_hours = width of the linear blend at each window edge: grid demand
# ramps over ~3h (morning pick-up / evening decay), so the process chain gets 3;
# operator load follows shift changes, which are sharper — 1h.
time_of_day:
  enabled: true
  profiles:
    - { param: "proc.flow.rate",  peak_hours: [6, 22], peak_multiplier: 1.15, off_peak_multiplier: 0.85, shoulder_hours: 3 }
    - { param: "proc.comp.speed", peak_hours: [6, 22], peak_multiplier: 1.10, off_peak_multiplier: 0.92, shoulder_hours: 3 }
    - { param: "hmi.cpu.util",    peak_hours: [7, 19], peak_multiplier: 1.30, off_peak_multiplier: 0.70, shoulder_hours: 1 }

# Real causal chains, per host (trigger and affected params live on the same host).
correlation:
  enabled: true
  groups:
    # -- Compressor train (PROC host) --
    - name: "lube_starvation"          # oil pressure lost -> bearing overheats -> rotor shakes
      trigger: { param: "proc.comp.lube_oil_pressure", band: "failed" }
      affects:
        - { param: "proc.comp.bearing_temp", bias_band: "failed",       strength: 0.7 }
        - { param: "proc.comp.vibration",    bias_band: "underperform", strength: 0.5 }
    - name: "bearing_vibration"        # a hot bearing drives vibration up
      trigger: { param: "proc.comp.bearing_temp", band: "failed" }
      affects:
        - { param: "proc.comp.vibration", bias_band: "underperform", strength: 0.5 }
    # -- Process flow (PROC host) --
    - name: "filter_choke"             # blocked filter chokes flow
      trigger: { param: "proc.dp.filter", band: "failed" }
      affects:
        - { param: "proc.flow.rate", bias_band: "underperform", strength: 0.6 }
    - name: "supply_loss"              # low inlet pressure -> low flow + starved suction
      trigger: { param: "proc.pressure.inlet", band: "failed" }
      affects:
        - { param: "proc.flow.rate",              bias_band: "underperform", strength: 0.6 }
        - { param: "proc.comp.suction_pressure",  bias_band: "underperform", strength: 0.6 }
    - name: "heater_hydrate"           # heater fails -> gas temp falls toward hydrate range
      trigger: { param: "proc.heater.outlet_temp", band: "failed" }
      affects:
        - { param: "proc.temp.gas", bias_band: "underperform", strength: 0.6 }
    # -- HMI workstation (HMI host) --
    - name: "thermal_cascade"          # stalled chassis fan -> CPU overheats
      trigger: { param: "hmi.fan.rpm", band: "failed" }
      affects:
        - { param: "hmi.cpu.temp", bias_band: "underperform", strength: 0.7 }
    - name: "paging_storm"             # memory exhausted -> CPU pegged
      trigger: { param: "hmi.mem.available", band: "failed" }
      affects:
        - { param: "hmi.cpu.util", bias_band: "underperform", strength: 0.6 }
    # -- Industrial switch (SW host) --
    - name: "switch_thermal"           # switch fan dies -> CRC errors + discards climb
      trigger: { param: "net.env.fan_state", band: "failed" }
      affects:
        - { param: "net.if.error_rate", bias_band: "underperform", strength: 0.5 }
        - { param: "net.if.discards",   bias_band: "underperform", strength: 0.4 }
    # -- PLC (PLC host) --
    - name: "io_fault_storm"           # I/O channel faults -> diagnostic events accumulate
      trigger: { param: "plc.io.channels_faulted", band: "failed" }
      affects:
        - { param: "plc.diag.event_rate", bias_band: "underperform", strength: 0.6 }

# Transitions ramp (÷ SIM_TIME_SCALE) instead of stepping. Ramp lengths follow the
# physical event, not a house style:
#   hmi.cpu.temp 1200s      — a chassis without forced airflow reaches thermal
#                             steady-state in ~15-20 min (equilibrium ≈1000s under
#                             sustained load in thermal-throttling studies)
#   proc.comp.bearing_temp 900s — lube starvation cooks a journal bearing in
#                             minutes; real trains trip on it in 5-15 min
#   proc.comp.vibration 600s — vibration follows bearing damage almost immediately
#                             (ISO 10816 zone changes are step-like)
#   proc.temp.gas 2400s     — pipe steel + flowing gas: tens of minutes of inertia
#   hmi.smart.realloc_sectors 7200s — media degradation accumulates over hours+
# After a ramp finishes, continuity's controlled walk takes over inside the new band.
trend:
  enabled: true
  ramp_seconds: 1800
  overrides:
    hmi.cpu.temp:              { ramp_seconds: 1200 }
    proc.comp.bearing_temp:    { ramp_seconds: 900 }
    proc.comp.vibration:       { ramp_seconds: 600 }
    proc.temp.gas:             { ramp_seconds: 2400 }
    hmi.smart.realloc_sectors: { ramp_seconds: 7200 }

# ~2% of due sends dropped: real SCADA field links lose the odd reading to comms
# retries and historian deadband gaps; a few percent is the plausible field rate.
dropout:
  enabled: true
  probability: 0.02
  overrides:
    hmi.smart.health_passed: { probability: 0.0 }   # never drop the safety verdict

# Minimum state-dwell = repair-time (MTTR) realism for the comm links. The global
# SIM_STICKINESS can't express this (it's one symmetric scalar for every param and
# band); `hold` sets bounded, randomized per-type recovery windows. Numbers reflect
# real repair profiles per medium, not a billing-period snapshot:
#   * Metro-E fiber failed 2-8h  — a buried fiber cut needs locate + truck-roll +
#                          splice; field MTTR for OSP fiber is hours, not a reboot.
#   * Metro-E fiber underperform 20-90m — a marginal span (dirty connector / aging
#                          SFP / borderline splice) lingers in low-margin before it
#                          either self-clears or degrades to a full cut.
#   * MPLS CE port: same physical SFP/DDM profile as fiber, same windows.
#   * SDH/SONET ring failed 3-10h — a *sustained* ring failure means a correlated
#                          dual-path fault (APS already absorbed any single cut),
#                          which is a bigger, rarer event than a plain fiber splice.
#   * SDH/SONET ring underperform 15-60m — a single protected path still needs a
#                          truck-roll to fix even though service isn't affected.
#   * Microwave PTP failed 1-4h — no digging, just a tower truck-roll to swap the
#                          ODU/antenna; faster than a buried-fiber splice.
#   * Microwave PTP underperform 10-40m — rain/multipath fade self-clears as the
#                          weather cell passes, similar timescale to VSAT rain fade.
#   * SCPC VSAT failed 15-40m — dedicated-carrier rain fade clears with the weather
#                          cell; no contention to prolong it.
#   * SCPC VSAT underperform 8-30m.
#   * IP VSAT (shared TDMA) failed 20-60m — outages can correlate with hub/beam
#                          congestion, not just local weather, so they linger longer
#                          than a dedicated SCPC carrier's.
#   * IP VSAT underperform 10-40m.
#   * Private APN failed 5-20m — cellular outages are typically a cell reboot/
#                          congestion clear or generator swap at the tower, fast.
#   * Private APN underperform 5-15m — brief cell-edge/congestion dips.
#   * LEO (Starlink-class) failed 5-15m, underperform 2-10m — beam handovers and
#                          transient obstructions clear faster than any other tier.
# Applies only to self-rolling streams (segments + the independent SCPC/IP-VSAT/
# APN/LEO circuits); wired circuits are slaved to their segment and ignore it.
# Keys use trailing-* prefixes, one per tech family (segment/circuit keys carry
# that family in the key).
hold:
  enabled: true
  overrides:
    "seg.pgn_metroe_*":     { failed: ["2h", "8h"], underperform: ["20m", "90m"] }
    "seg.pgn_mpls_*":       { failed: ["2h", "8h"], underperform: ["20m", "90m"] }
    "seg.pgn_sdh_*":        { failed: ["3h", "10h"], underperform: ["15m", "60m"] }
    "seg.pgn_microwave_*":  { failed: ["1h", "4h"], underperform: ["10m", "40m"] }
    "circ.pgn_scpc_*":      { failed: ["15m", "40m"], underperform: ["8m", "30m"] }
    "circ.pgn_ipvsat_*":    { failed: ["20m", "60m"], underperform: ["10m", "40m"] }
    "circ.pgn_apn_*":       { failed: ["5m", "20m"], underperform: ["5m", "15m"] }
    "circ.pgn_leo_*":       { failed: ["5m", "15m"], underperform: ["2m", "10m"] }
    "circ.pgn_apn_*":      { failed: ["5m", "20m"], underperform: ["5m", "15m"] }

# Backfill parameters for THIS mode (run `make backfill` yourself — never automatic).
backfill:
  enabled: false
  days: 7
  speed_multiplier: 500
