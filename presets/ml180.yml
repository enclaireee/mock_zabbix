# preset: ml180 — 180-day PdM training dataset with a realistic failure lifecycle.
# Successor to `ml` for long-horizon runs. Three structural changes over ml:
#   - progression.ladder  => no good->failed teleports; degradation and recovery
#     both pass through underperform (a NIC flaps before it dies, etc.)
#   - maintenance         => failed is ABSORBING; a routine site visit every
#     15d (±2d, staggered per host) repairs everything at once and pings the
#     hmi.maintenance work-order marker. No more random self-heals.
#   - day-scale trend ramps => degradation develops over 1-3 days, so an hourly
#     dataset sees a real prodrome (Warning hours before High), not a 2-point blip.
#
# REQUIRED pairing: SIM_STICKINESS=0.995 in .env. With absorbing failure, the old
# 0.94 would push every param into failed within days and saturate the label.
# At 0.995 a 1m-interval param fails roughly every 1-2 months and waits up to
# ~15d for repair => roughly 10% failed-time per param, tune from there.
# Generate: make config MODE=ml180 && make check && make backfill DAYS=180

continuity:
  enabled: true
  step_scale: 0.4
  reversion: 0.08

correlation:
  enabled: true
  groups:
    - name: "lube_starvation"
      trigger: { param: "proc.comp.lube_oil_pressure", band: "failed" }
      affects:
        - { param: "proc.comp.bearing_temp", bias_band: "failed",       strength: 0.7 }
        - { param: "proc.comp.vibration",    bias_band: "underperform", strength: 0.5 }
    - name: "filter_choke"
      trigger: { param: "proc.dp.filter", band: "failed" }
      affects:
        - { param: "proc.flow.rate", bias_band: "underperform", strength: 0.6 }
    - name: "supply_loss"
      trigger: { param: "proc.pressure.inlet", band: "failed" }
      affects:
        - { param: "proc.flow.rate",             bias_band: "underperform", strength: 0.6 }
        - { param: "proc.comp.suction_pressure", bias_band: "underperform", strength: 0.6 }
    - name: "thermal_cascade"
      trigger: { param: "hmi.fan.rpm", band: "failed" }
      affects:
        - { param: "hmi.cpu.temp", bias_band: "underperform", strength: 0.7 }
    - name: "paging_storm"
      trigger: { param: "hmi.mem.available", band: "failed" }
      affects:
        - { param: "hmi.cpu.util", bias_band: "underperform", strength: 0.6 }
    # A corroded connector throws CRC errors for hours before the link dies —
    # gives nic.oper_state (the top High-label contributor) a visible precursor.
    - name: "cable_degradation"
      trigger: { param: "hmi.nic.errors", band: "failed" }
      affects:
        - { param: "hmi.nic.oper_state", bias_band: "underperform", strength: 0.5 }

progression:
  ladder: true

maintenance:
  enabled: true
  interval: "15d"        # routine PM twice a month
  jitter: "2d"           # ±, so repairs don't land on a learnable clock
  event_key: "hmi.maintenance"
  # Reactive truck roll: a failed component triggers an unscheduled repair 1-3d
  # later (a dead operator-station part doesn't wait 2 weeks). Without this,
  # routine-only dwell (~7.5d) either saturates the failure label (>60% positive
  # hours) or — if failures are made rarer — leaves ~1 episode per host in 180d.
  dispatch: ["1d", "3d"]

# Day-scale ramps: at hourly resolution a threshold crossing arrives after many
# hours of visible slope — the lead time the PdM model is supposed to learn.
trend:
  enabled: true
  ramp_seconds: 86400            # 24h default
  overrides:
    hmi.cpu.temp:              { ramp_seconds: 129600 }   # 36h — thermal paste/dust is slow
    proc.comp.bearing_temp:    { ramp_seconds: 129600 }
    hmi.smart.realloc_sectors: { ramp_seconds: 259200 }   # 3d — media wear is slowest

dropout:     { enabled: false }   # complete data for training
time_of_day: { enabled: false }

backfill:
  enabled: false
  days: 180
  speed_multiplier: 6000
